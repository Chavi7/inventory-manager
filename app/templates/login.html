<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in &middot; Dragon Technologies Inventory</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
<div class="login-card">
  <img src="{{ url_for('static', filename='img/dragonforge-icon-sm.png') }}"
       alt="Dragon Technologies" class="login-logo">
  <h1 class="login-title">INVENTORY MANAGER</h1>
  <p class="login-sub">CTEC &middot; Dragon Technologies Ops Console</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="post" class="login-form">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autofocus required>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>
    <button type="submit" class="btn btn-primary btn-block">Log in</button>
  </form>
</div>
</body>
</html>
